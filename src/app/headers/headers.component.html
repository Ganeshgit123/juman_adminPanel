<div class="row">
    <div class="col-md-11">
        <form [formGroup]="menuForm">
            <div formArrayName="product">
                <div class="row" *ngFor="let comp of menuForm['controls'].product['controls']; let i=index;">
                    <div class="col-md-12" [formGroupName]="i">
                        <div class="row">
                            <div class="col-md-5">
                                <div class="form-group">
                                    <label>{{"Menu"| translate}} {{i+1}}</label>
                                    <input type="text" class="form-control" formControlName="enMenu">
                                </div>
                            </div>
                            <div class="col-md-5">
                                <div class="form-group">
                                    <label>{{"Menu" | translate}} {{i+1}} {{"Arabic" | translate}}</label>
                                    <input type="text" class="form-control" formControlName="arMenu">
                                </div>
                            </div>
                            <div class="col-md-2">
                                <button class="update_btn" (click)="onSubmit(comp)">{{"Update" | translate}}</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
    <div class="col-md-1">
        <div class="row top_mar">
            <div class="col-md-12">
                <div *ngFor="let item of getvalue" class="menu_tog">
                    <button (change)="changeMenuStatus(item)" class="tog_btn">
                        <label class="switch">
                            <input unchecked type="checkbox" *ngIf="item.isActive == false">
                            <input checked type="checkbox" *ngIf="item.isActive == true">
                            <span class="slider"></span>
                        </label>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
